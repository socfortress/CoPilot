minimumReleaseAge: 0
shellEmulator: true

trustPolicy: off

trustPolicyExclude:
  - chokidar
  - semver

allowBuilds:
  "@parcel/watcher": true
  "@tailwindcss/oxide": true
  esbuild: true
  unrs-resolver: true

overrides:
  "@codemirror/state": 6.7.0
  "@codemirror/view": 6.43.2
  "@mui/icons-material": ^7.3.9
  rolldown: 1.0.1

peerDependencyRules:
  allowedVersions:
    eslint: "10"
